name: CI

# Validation runs only on pull requests targeting `main`. There is no push
# trigger: `main` is gated pre-merge by the PR, and rebase-merge lands each
# reviewed commit verbatim. `workflow_call` lets publish.yml reuse this as a
# pre-publish gate on tagged commits.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  workflow_call:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

# Every job carries the same guard: skip while the PR is a draft OR carries the
# `skip-ci` label, run once it is marked ready for review without that label (and
# on pushes thereafter). Label add/remove events are included so toggling
# `skip-ci` takes effect immediately for new workflow runs. The guard always
# passes when this workflow is invoked via workflow_call (no pull_request
# context), so the publish gate still runs.
jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ci'))
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ci'))
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ci'))
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  design-tokens:
    name: Design tokens
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ci'))
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm design:tokens:check

  generate-validate:
    name: Generate & validate registry
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ci'))
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      # `pnpm generate` validates every manifest (exits non-zero on an invalid
      # one) and writes runtime/generated/registry.ts; the runtime typecheck then
      # proves the generated file is valid TypeScript.
      - run: pnpm generate
      - run: pnpm --filter @sovereignfs/runtime typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ci'))
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ci'))
    # A throwaway Postgres so the env-gated *.pg.test.ts parity suites run in CI
    # instead of skipping (NFR-03). SQLite tests need no service.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sovereign
          POSTGRES_PASSWORD: sovereign
          POSTGRES_DB: sovereign_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sovereign"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://sovereign:sovereign@localhost:5432/sovereign_test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm test

  storybook-build:
    name: Storybook build
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ci'))
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build Storybook
        run: pnpm build-storybook
      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: storybook-static
          path: packages/ui/storybook-static/
          retention-days: 7
