name: CI

# Validation runs only on pull requests targeting `main`. Documentation-only PRs
# still start the workflow, but a cheap changes job skips the expensive code
# jobs while the Docs workflow handles docs validation. There is no push trigger:
# `main` is gated pre-merge by the PR, and rebase-merge lands each reviewed
# commit verbatim. `workflow_call` lets publish.yml reuse this as a pre-publish
# gate on tagged commits and always runs the full validation suite.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  workflow_call:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

# Expensive validation jobs carry the same guard: skip while the PR is a draft
# or carries the `skip-ci` label, and skip when the `changes` job says the files
# touched are irrelevant to that job. Label add/remove events are included so
# toggling `skip-ci` takes effect immediately for new workflow runs. The guard
# always passes when this workflow is invoked via workflow_call (no pull_request
# context), so the publish gate still runs.
jobs:
  changes:
    name: Classify changes
    runs-on: ubuntu-latest
    outputs:
      format: ${{ steps.classify.outputs.format }}
      lint: ${{ steps.classify.outputs.lint }}
      typecheck: ${{ steps.classify.outputs.typecheck }}
      design_tokens: ${{ steps.classify.outputs.design_tokens }}
      generate_validate: ${{ steps.classify.outputs.generate_validate }}
      build: ${{ steps.classify.outputs.build }}
      test: ${{ steps.classify.outputs.test }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: classify
        name: Classify pull request paths
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            {
              echo "format=true"
              echo "lint=true"
              echo "typecheck=true"
              echo "design_tokens=true"
              echo "generate_validate=true"
              echo "build=true"
              echo "test=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD > /tmp/changed-files

          if [[ ! -s /tmp/changed-files ]]; then
            {
              echo "format=true"
              echo "lint=true"
              echo "typecheck=true"
              echo "design_tokens=true"
              echo "generate_validate=true"
              echo "build=true"
              echo "test=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run_format=false
          run_code=false
          run_design_tokens=false
          run_generate_validate=false

          while IFS= read -r path; do
            # Docs-only paths are handled by the Docs workflow, so they do not
            # need the main CI jobs.
            case "$path" in
              docs/*|apps/docs/*|*.md|.github/PULL_REQUEST_TEMPLATE.md|.github/PULL_REQUEST_TEMPLATE/*)
                continue
                ;;
            esac

            # Any remaining file is at least relevant to formatting.
            run_format=true

            case "$path" in
              apps/auth/*|runtime/*|packages/*|plugins/*|scripts/*|bin/*|__tests__/*)
                run_code=true
                ;;
              package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json|tsconfig.json)
                run_code=true
                ;;
              eslint.config.*|prettier.config.*|vitest.config.*|playwright.config.*)
                run_code=true
                ;;
              Dockerfile|docker-compose*.yml|.env.example|.github/actions/setup/*)
                run_code=true
                ;;
            esac

            case "$path" in
              packages/ui/src/*|runtime/app/*|plugins/*/app/*|scripts/design-tokens-check.ts)
                run_design_tokens=true
                ;;
            esac

            case "$path" in
              plugins/*/manifest.json|plugins/*/package.json|packages/manifest/*)
                run_generate_validate=true
                ;;
              scripts/generate-registry.ts|scripts/install-plugins.ts)
                run_generate_validate=true
                ;;
              scripts/__tests__/generate-registry.test.ts|runtime/src/registry.ts|runtime/generated/*)
                run_generate_validate=true
                ;;
            esac
          done < /tmp/changed-files

          {
            echo "format=$run_format"
            echo "lint=$run_code"
            echo "typecheck=$run_code"
            echo "design_tokens=$run_design_tokens"
            echo "generate_validate=$run_generate_validate"
            echo "build=$run_code"
            echo "test=$run_code"
          } >> "$GITHUB_OUTPUT"

  format:
    name: Format
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ci') &&
      needs.changes.outputs.format == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ci') &&
      needs.changes.outputs.lint == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ci') &&
      needs.changes.outputs.typecheck == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  design-tokens:
    name: Design tokens
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ci') &&
      needs.changes.outputs.design_tokens == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm design:tokens:check

  generate-validate:
    name: Generate & validate registry
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ci') &&
      needs.changes.outputs.generate_validate == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      # `pnpm generate` validates every manifest (exits non-zero on an invalid
      # one) and writes runtime/generated/registry.ts; the runtime typecheck then
      # proves the generated file is valid TypeScript.
      - run: pnpm generate
      - run: pnpm --filter @sovereignfs/runtime typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ci') &&
      needs.changes.outputs.build == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ci') &&
      needs.changes.outputs.test == 'true')
    # A throwaway Postgres so the env-gated *.pg.test.ts parity suites run in CI
    # instead of skipping (NFR-03). SQLite tests need no service.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sovereign
          POSTGRES_PASSWORD: sovereign
          POSTGRES_DB: sovereign_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sovereign"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://sovereign:sovereign@localhost:5432/sovereign_test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm test
