name: Publish

# Published packages have independent release cycles, each triggered by its own tag:
#   sdk-vX.Y.Z            → @sovereignfs/sdk
#   ui-vX.Y.Z             → @sovereignfs/ui
#   create-plugin-vX.Y.Z  → @sovereignfs/create-plugin
# All other @sovereignfs/* packages are private and never published.
on:
  push:
    tags:
      - 'sdk-v*.*.*'
      - 'ui-v*.*.*'
      - 'create-plugin-v*.*.*'

permissions:
  contents: read

jobs:
  # Re-run the full validation suite on the tagged commit; nothing publishes
  # unless it passes.
  validate:
    uses: ./.github/workflows/ci.yml

  sdk:
    name: Publish @sovereignfs/sdk
    needs: validate
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Verify tag matches package version
        run: |
          expected="${GITHUB_REF_NAME#sdk-v}"
          actual="$(node -p "JSON.parse(require('node:fs').readFileSync('packages/sdk/package.json', 'utf8')).version")"
          if [[ "$actual" != "$expected" ]]; then
            echo "Tag ${GITHUB_REF_NAME} expects @sovereignfs/sdk@${expected}, but package.json is ${actual}." >&2
            exit 1
          fi
      - run: pnpm --filter @sovereignfs/sdk build
      - run: pnpm --filter @sovereignfs/sdk publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  ui:
    name: Publish @sovereignfs/ui
    needs: validate
    if: startsWith(github.ref, 'refs/tags/ui-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Verify tag matches package version
        run: |
          expected="${GITHUB_REF_NAME#ui-v}"
          actual="$(node -p "JSON.parse(require('node:fs').readFileSync('packages/ui/package.json', 'utf8')).version")"
          if [[ "$actual" != "$expected" ]]; then
            echo "Tag ${GITHUB_REF_NAME} expects @sovereignfs/ui@${expected}, but package.json is ${actual}." >&2
            exit 1
          fi
      - run: pnpm --filter @sovereignfs/ui build
      - name: Build Storybook
        run: pnpm build-storybook
      - run: pnpm --filter @sovereignfs/ui publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-plugin:
    name: Publish @sovereignfs/create-plugin
    needs: validate
    if: startsWith(github.ref, 'refs/tags/create-plugin-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Verify tag matches package version
        run: |
          expected="${GITHUB_REF_NAME#create-plugin-v}"
          actual="$(node -p "JSON.parse(require('node:fs').readFileSync('packages/create-plugin/package.json', 'utf8')).version")"
          if [[ "$actual" != "$expected" ]]; then
            echo "Tag ${GITHUB_REF_NAME} expects @sovereignfs/create-plugin@${expected}, but package.json is ${actual}." >&2
            exit 1
          fi
      - run: pnpm --filter @sovereignfs/create-plugin build
      - run: pnpm --filter @sovereignfs/create-plugin publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
