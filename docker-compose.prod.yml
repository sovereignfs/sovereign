# Production Docker Compose.
#
# Usage:
#   # Build from source (no SOVEREIGN_VERSION needed):
#   docker compose -f docker-compose.prod.yml up --build -d
#
#   # Pull published images (set SOVEREIGN_VERSION to a release tag, e.g. v0.15.0):
#   SOVEREIGN_VERSION=v0.15.0 docker compose -f docker-compose.prod.yml up -d
#
# Mailpit is dev-only and is absent here. Configure a real SMTP provider via
# the SMTP_* environment variables in your .env file.
#
# Both services are exposed on the host. In production, put a reverse proxy
# (nginx, Caddy) in front of the runtime port. The auth port must also be
# publicly reachable — browsers are redirected there for login.
# See docs/self-hosting.md for full setup instructions.
#
# Quick start:
#   cp .env.example .env            # fill in AUTH_SECRET and all required vars
#   docker compose -f docker-compose.prod.yml up --build -d
services:
  auth:
    # When SOVEREIGN_VERSION is set, pull the published image from GHCR.
    # Without it, build from source in this repo (the fallback for forks and
    # air-gapped environments).
    image: ${SOVEREIGN_VERSION:+ghcr.io/sovereignfs/sovereign-auth:${SOVEREIGN_VERSION}}
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    container_name: sovereign-auth
    ports:
      - '${AUTH_PORT:-4001}:3001'
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      AUTH_SECRET: '${AUTH_SECRET}'
      AUTH_DATABASE_URL: '${AUTH_DATABASE_URL:-file:./data/auth.db}'
      AUTH_INVITE_ONLY: '${AUTH_INVITE_ONLY:-false}'
      AUTH_REQUIRE_EMAIL_VERIFICATION: '${AUTH_REQUIRE_EMAIL_VERIFICATION:-true}'
      # Public URL where browsers reach the auth server — better-auth uses it for
      # callbacks, cookie domain, and the CSRF origin check on login. Set this to
      # your public domain in a real deployment, e.g. https://auth.example.com
      # (or https://example.com if auth is path-prefixed on the same domain).
      # Defaults to the mapped auth host port so local prod testing works without
      # a proxy: the browser posts from localhost:4001, which must match baseURL.
      AUTH_BASE_URL: '${AUTH_BASE_URL:-http://localhost:${AUTH_PORT:-4001}}'
      # Internal Docker service address trusted for CSRF checks on server-to-server
      # calls from the runtime (which sends Origin: http://auth:3001). Always set
      # this when AUTH_BASE_URL is a public domain different from the service name.
      AUTH_TRUSTED_ORIGINS: '${AUTH_TRUSTED_ORIGINS:-http://auth:3001}'
      # Public runtime URL the auth server redirects browsers back to after
      # login/registration. Your public domain in a real deployment; defaults to
      # the mapped runtime host port so local prod testing redirects to :4000
      # (not the dev :3000 left in .env).
      NEXT_PUBLIC_RUNTIME_URL: '${NEXT_PUBLIC_RUNTIME_URL:-http://localhost:${RUNTIME_PORT:-4000}}'
      SOVEREIGN_ADMIN_KEY: '${SOVEREIGN_ADMIN_KEY}'
      # Only needed once SMTP is configured via Console with a password
      # (Email delivery settings) — the auth server decrypts its own local
      # copy independently of the runtime. Same key as the runtime's vault.
      SOVEREIGN_VAULT_KEY: '${SOVEREIGN_VAULT_KEY}'
      # Opt-in SQLite at-rest encryption (RFC 0071). Empty/unset = plaintext,
      # unchanged from today. Must match the runtime service's value exactly —
      # see docs/self-hosting.md's "SQLite at-rest encryption" section.
      SOVEREIGN_DB_ENCRYPTION_KEY: '${SOVEREIGN_DB_ENCRYPTION_KEY:-}'
      # Internal Docker service address for auth→runtime server-to-server calls
      # (e.g. recording email-delivery-failure activity log entries). Always
      # the internal container port (3000), not the host-mapped RUNTIME_PORT.
      SOVEREIGN_RUNTIME_URL: 'http://runtime:3000'
      # WebAuthn / passkeys. RP_ID must be the registrable domain (e.g. "example.com"),
      # NOT the full hostname — passkeys are scoped to it and must be presentable on every
      # origin listed in AUTH_WEBAUTHN_ORIGIN. Defaults are derived from AUTH_BASE_URL which
      # gives the auth subdomain hostname — correct for single-domain setups, but wrong when
      # the runtime and auth run on different subdomains (e.g. sovereign.example.com +
      # auth.sovereign.example.com). Always set these explicitly in production.
      AUTH_WEBAUTHN_RP_ID: '${AUTH_WEBAUTHN_RP_ID:-}'
      AUTH_WEBAUTHN_RP_NAME: '${AUTH_WEBAUTHN_RP_NAME:-Sovereign}'
      AUTH_WEBAUTHN_ORIGIN: '${AUTH_WEBAUTHN_ORIGIN:-}'
      # Cookie domain for cross-subdomain session sharing. Required when auth and
      # runtime are on different subdomains. Set to the shared parent domain with
      # a leading dot (e.g. .example.com). Leave unset for localhost dev.
      AUTH_COOKIE_DOMAIN: '${AUTH_COOKIE_DOMAIN:-}'
    volumes:
      # Named volume (not a host bind mount): Docker initialises it with the
      # image's /app/data ownership, so the non-root runner can write SQLite +
      # avatars with zero host-side setup. Back up with `sv backup` before
      # every upgrade.
      - sovereign_data:/app/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/api/health']
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - sovereign_net

  runtime:
    image: ${SOVEREIGN_VERSION:+ghcr.io/sovereignfs/sovereign-runtime:${SOVEREIGN_VERSION}}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sovereign-runtime
    ports:
      - '${RUNTIME_PORT:-4000}:3000'
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      # Internal address for server-to-server calls (runtime → auth) over the
      # Docker bridge network. Never browser-reachable.
      SOVEREIGN_AUTH_URL: 'http://auth:3001'
      # Browser-facing auth URL for compatibility routes — must be reachable
      # from the user's browser if those routes are linked directly (unlike
      # SOVEREIGN_AUTH_URL above, the internal service name). Precedence: an
      # explicit SOVEREIGN_AUTH_PUBLIC_URL wins; otherwise it falls back to
      # AUTH_BASE_URL (your public auth domain in a real deployment); otherwise
      # to the mapped auth host port so local prod testing works without a
      # reverse proxy (browser → localhost:4001, not auth:3001).
      SOVEREIGN_AUTH_PUBLIC_URL: '${SOVEREIGN_AUTH_PUBLIC_URL:-${AUTH_BASE_URL:-http://localhost:${AUTH_PORT:-4001}}}'
      SOVEREIGN_ADMIN_KEY: '${SOVEREIGN_ADMIN_KEY}'
      # 32-byte key for the plugin secret vault (sdk.secrets) — encrypts
      # values like a plugin-stored GitHub PAT at rest. No default (fails
      # closed if unset, per the platform's "no secrets with defaults" rule):
      # generate with `openssl rand -base64 32`. Required by any plugin that
      # calls sdk.secrets, including the bundled Plainwrite plugin's GitHub
      # PAT credential flow — leaving this unset surfaces as a runtime error
      # ("SOVEREIGN_VAULT_KEY is required...") the first time a user tries to
      # save a PAT, not at container startup.
      SOVEREIGN_VAULT_KEY: '${SOVEREIGN_VAULT_KEY}'
      # Opt-in SQLite at-rest encryption (RFC 0071). Empty/unset = plaintext,
      # unchanged from today. Must match the auth service's value exactly — see
      # docs/self-hosting.md's "SQLite at-rest encryption" section. Existing
      # plaintext instances must run `sv db encrypt` before setting this.
      SOVEREIGN_DB_ENCRYPTION_KEY: '${SOVEREIGN_DB_ENCRYPTION_KEY:-}'
      # Shared signing secret — the runtime verifies the auth server's session
      # cookie locally with it (SRS AUTH-05); must match the auth service.
      AUTH_SECRET: '${AUTH_SECRET}'
      NEXT_PUBLIC_RUNTIME_URL: '${NEXT_PUBLIC_RUNTIME_URL:-http://localhost:${RUNTIME_PORT:-4000}}'
      DATABASE_URL: '${DATABASE_URL:-file:./data/sovereign.db}'
      DB_DIALECT: '${DB_DIALECT:-sqlite}'
      # Show the bundled example/demo apps (hidden by default). See .env.example.
      SOVEREIGN_EXAMPLES_ENABLED: '${SOVEREIGN_EXAMPLES_ENABLED:-}'
      # Hide plugins flagged development: true (shown by default). See .env.example.
      SOVEREIGN_HIDE_DEVELOPMENT_PLUGINS: '${SOVEREIGN_HIDE_DEVELOPMENT_PLUGINS:-}'
      SMTP_HOST: '${SMTP_HOST:-}'
      SMTP_PORT: '${SMTP_PORT:-587}'
      SMTP_USER: '${SMTP_USER:-}'
      SMTP_PASS: '${SMTP_PASS:-}'
      SMTP_FROM: '${SMTP_FROM:-}'
      # Structured log level. One of: error | warn | info | debug (default: warn).
      LOG_LEVEL: '${LOG_LEVEL:-warn}'
      # Web Push / VAPID (RFC 0016). Generate once with: node -e "require('web-push').generateVAPIDKeys()"
      # Leave blank to disable push notifications.
      VAPID_PUBLIC_KEY: '${VAPID_PUBLIC_KEY:-}'
      VAPID_PRIVATE_KEY: '${VAPID_PRIVATE_KEY:-}'
      VAPID_CONTACT: '${VAPID_CONTACT:-}'
      # Notification transport (RFC 0034). Default is 'sse' (in-process EventEmitter
      # push, no extra infra) — correct for a single runtime container, which is
      # this compose file's topology. If you scale to multiple runtime containers
      # or processes, set this to 'redis' (and REDIS_URL) instead: an in-process
      # 'sse' broker cannot see notifications published on a different container,
      # so cross-container real-time delivery would silently stop working. Set to
      # 'polling' to disable push entirely and fall back to client polling.
      # When using 'redis', also uncomment the redis service block below and add it
      # to depends_on. REDIS_URL is required when NOTIFICATION_TRANSPORT=redis.
      NOTIFICATION_TRANSPORT: '${NOTIFICATION_TRANSPORT:-sse}'
      REDIS_URL: '${REDIS_URL:-}'
      # Cookie domain for cross-subdomain session invalidation. Must match the
      # value set in the auth service — used to clear the session-cache cookie
      # after avatar/name changes so the shell reflects them immediately.
      AUTH_COOKIE_DOMAIN: '${AUTH_COOKIE_DOMAIN:-}'
      # Instance identity env overrides (can also be set via Console → Instance).
      INSTANCE_NAME: '${INSTANCE_NAME:-Sovereign}'
      INSTANCE_LOGO: '${INSTANCE_LOGO:-}'
      INSTANCE_LOGO_DARK: '${INSTANCE_LOGO_DARK:-}'
      INSTANCE_FAVICON: '${INSTANCE_FAVICON:-}'
    volumes:
      # Shared with the auth service — both resolve relative SQLite paths
      # against /app (the cwd), so both DBs and avatars land in this volume.
      - sovereign_data:/app/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    depends_on:
      auth:
        condition: service_healthy
    networks:
      - sovereign_net

  # ── On-demand admin CLI (RFC 0071) ──────────────────────────────────────────
  # Never starts with a plain `up` — the `tools` profile keeps it out of the
  # default service set. Gives the `sv` CLI (sv db encrypt/decrypt, sv user
  # reset-mfa, …) direct access to the same named volume the services above
  # use, without a separate host checkout. Invoke explicitly, e.g.:
  #   docker compose -f docker-compose.prod.yml --profile tools run --rm \
  #     tools pnpm sv db encrypt --dataDir /app/data
  # Stop auth/runtime first — these commands assume nothing else has the
  # SQLite files open.
  tools:
    profiles: ['tools']
    build:
      context: .
      dockerfile: Dockerfile
      target: tools
    container_name: sovereign-tools
    environment:
      SOVEREIGN_DB_ENCRYPTION_KEY: '${SOVEREIGN_DB_ENCRYPTION_KEY:-}'
      DATABASE_URL: '${DATABASE_URL:-file:./data/sovereign.db}'
      AUTH_DATABASE_URL: '${AUTH_DATABASE_URL:-file:./data/auth.db}'
    volumes:
      - sovereign_data:/app/data
      # `sv db encrypt`/`decrypt` write their automatic pre-migration backup to
      # <workspace root>/backups — bind-mounted to the host (not the named
      # data volume) so it survives this container exiting (`--rm`). Lands in
      # ./backups next to this compose file.
      - ./backups:/app/backups

  # ── Optional: Redis for instant cross-process notification delivery ─────────
  # Uncomment this block and set NOTIFICATION_TRANSPORT=redis + REDIS_URL in the
  # runtime service above to enable Redis-backed SSE notifications. Required for
  # multi-process deployments (PM2 cluster, multiple runtime containers).
  #
  # redis:
  #   image: redis:7-alpine
  #   container_name: sovereign-redis
  #   restart: unless-stopped
  #   networks:
  #     - sovereign_net

volumes:
  sovereign_data:
    # Pin the external volume name so it is not prefixed with the Compose project
    # name (which defaults to the checkout directory). This keeps it a stable,
    # predictable `sovereign_data` regardless of where the repo is cloned — the
    # backup/restore commands in docs/ reference it by this exact name.
    name: sovereign_data

networks:
  sovereign_net:
    driver: bridge
