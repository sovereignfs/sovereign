# Production Docker Compose.
#
# Usage:  docker compose -f docker-compose.prod.yml up -d
#
# Mailpit is dev-only and is absent here. Configure a real SMTP provider via
# the SMTP_* environment variables in your .env file.
#
# The auth server is internal-only — it is not mapped to a host port. Place a
# reverse proxy (nginx, Caddy, Traefik) in front of the runtime container and
# route all traffic through it. See docs/self-hosting.md for full instructions.
#
# Quick start:
#   cp .env.example .env            # fill in AUTH_SECRET and all required vars
#   docker compose -f docker-compose.prod.yml up --build -d
services:
  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    container_name: sovereign-auth
    expose:
      - '3001'
    restart: unless-stopped
    environment:
      AUTH_SECRET: '${AUTH_SECRET}'
      AUTH_DATABASE_URL: '${AUTH_DATABASE_URL:-file:./data/auth.db}'
      AUTH_INVITE_ONLY: '${AUTH_INVITE_ONLY:-false}'
      AUTH_BASE_URL: '${AUTH_BASE_URL:-http://auth:3001}'
      NEXT_PUBLIC_RUNTIME_URL: '${NEXT_PUBLIC_RUNTIME_URL}'
      SOVEREIGN_ADMIN_KEY: '${SOVEREIGN_ADMIN_KEY}'
    volumes:
      # Named volume (not a host bind mount): Docker initialises it with the
      # image's /app/data ownership, so the non-root runner can write SQLite +
      # avatars with zero host-side setup. Back up with `docker run --rm -v
      # sovereign_data:/data -v "$PWD":/backup alpine tar czf /backup/data.tgz -C /data .`
      - sovereign_data:/app/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/api/health']
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - sovereign_net

  runtime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sovereign-runtime
    ports:
      - '${RUNTIME_PORT:-4000}:3000'
    restart: unless-stopped
    environment:
      SOVEREIGN_AUTH_URL: 'http://auth:3001'
      SOVEREIGN_ADMIN_KEY: '${SOVEREIGN_ADMIN_KEY}'
      # Shared signing secret — the runtime verifies the auth server's session
      # cookie locally with it (SRS AUTH-05); must match the auth service.
      AUTH_SECRET: '${AUTH_SECRET}'
      NEXT_PUBLIC_RUNTIME_URL: '${NEXT_PUBLIC_RUNTIME_URL}'
      DATABASE_URL: '${DATABASE_URL:-file:./data/sovereign.db}'
      DB_DIALECT: '${DB_DIALECT:-sqlite}'
      SMTP_HOST: '${SMTP_HOST:-}'
      SMTP_PORT: '${SMTP_PORT:-587}'
      SMTP_USER: '${SMTP_USER:-}'
      SMTP_PASS: '${SMTP_PASS:-}'
      SMTP_FROM: '${SMTP_FROM:-}'
    volumes:
      # Shared with the auth service — both resolve relative SQLite paths
      # against /app (the cwd), so both DBs and avatars land in this volume.
      - sovereign_data:/app/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    depends_on:
      auth:
        condition: service_healthy
    networks:
      - sovereign_net

volumes:
  sovereign_data:

networks:
  sovereign_net:
    driver: bridge
