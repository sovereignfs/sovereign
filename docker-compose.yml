# Local development services.
#
# Runs Mailpit (email capture), the auth server, and the runtime together on a
# shared internal network. See docs/self-hosting.md for setup instructions.
#
# For active code development (hot-reload), use `pnpm dev` instead. This file
# is for spinning up the full containerised stack locally.
#
# Quick start:
#   cp .env.example .env          # fill in AUTH_SECRET at minimum
#   docker compose up --build
services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: sovereign-mailpit
    restart: unless-stopped
    ports:
      - '${MAILPIT_SMTP_PORT:-1025}:1025' # SMTP endpoint the app sends to
      - '${MAILPIT_UI_PORT:-8025}:8025' # web inbox — open http://localhost:8025
    environment:
      # Accept mail without auth/TLS so the dev app can send freely.
      MP_SMTP_AUTH_ACCEPT_ANY: 'true'
      MP_SMTP_AUTH_ALLOW_INSECURE: 'true'
    networks:
      - sovereign_net

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    container_name: sovereign-auth
    # The production image runs as a non-root user; here we override to root so
    # writes to the host `./data` bind mount work regardless of host ownership.
    # (Prod uses a named volume instead and keeps the non-root user.)
    user: root
    # Exposed to the host so the browser can reach the auth login UI directly.
    # The runtime redirects to SOVEREIGN_AUTH_PUBLIC_URL (localhost:3001) for
    # browser-facing redirects, while keeping SOVEREIGN_AUTH_URL=http://auth:3001
    # for internal server-to-server calls. Dev-only: production keeps auth
    # internal (docker-compose.prod.yml uses expose, not ports).
    ports:
      - '${AUTH_PORT:-3001}:3001'
    environment:
      AUTH_SECRET: '${AUTH_SECRET}'
      AUTH_DATABASE_URL: '${AUTH_DATABASE_URL:-file:./data/auth.db}'
      AUTH_INVITE_ONLY: '${AUTH_INVITE_ONLY:-false}'
      # better-auth base URL — must be the browser-reachable address so
      # callback and cookie URLs resolve in the browser after login.
      AUTH_BASE_URL: '${AUTH_BASE_URL:-http://localhost:3001}'
      # Internal Docker service address trusted for server-to-server CSRF checks.
      # The runtime sends Origin: http://auth:3001 for internal calls; adding it
      # here ensures those calls are accepted even when AUTH_BASE_URL is the
      # public domain.
      AUTH_TRUSTED_ORIGINS: '${AUTH_TRUSTED_ORIGINS:-http://auth:3001}'
      NEXT_PUBLIC_RUNTIME_URL: '${NEXT_PUBLIC_RUNTIME_URL:-http://localhost:3000}'
      SOVEREIGN_ADMIN_KEY: '${SOVEREIGN_ADMIN_KEY}'
    volumes:
      - ./data:/app/data
    networks:
      - sovereign_net

  runtime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sovereign-runtime
    # See the auth service: root override so the host `./data` bind mount is
    # writable. Prod (docker-compose.prod.yml) keeps the image's non-root user.
    user: root
    ports:
      - '${RUNTIME_PORT:-3000}:3000'
    environment:
      # Overrides the .env value (which points to localhost for native dev).
      # Inside Docker, the runtime reaches auth via the internal service name.
      SOVEREIGN_AUTH_URL: 'http://auth:3001'
      # Browser-facing URL for auth redirects (login/logout). Differs from
      # SOVEREIGN_AUTH_URL because browsers can't resolve the internal service
      # name "auth". Defaults to localhost in dev; set to your public domain
      # in production when not using the internal service name.
      SOVEREIGN_AUTH_PUBLIC_URL: '${SOVEREIGN_AUTH_PUBLIC_URL:-http://localhost:3001}'
      SOVEREIGN_ADMIN_KEY: '${SOVEREIGN_ADMIN_KEY}'
      # Shared signing secret — the runtime verifies the auth server's session
      # cookie locally with it (SRS AUTH-05); must match the auth service.
      AUTH_SECRET: '${AUTH_SECRET}'
      NEXT_PUBLIC_RUNTIME_URL: '${NEXT_PUBLIC_RUNTIME_URL:-http://localhost:3000}'
      DATABASE_URL: '${DATABASE_URL:-file:./data/sovereign.db}'
      DB_DIALECT: '${DB_DIALECT:-sqlite}'
      # Email routes to the Mailpit service on the internal network.
      SMTP_HOST: mailpit
      SMTP_PORT: '${MAILPIT_SMTP_PORT:-1025}'
      SMTP_USER: '${SMTP_USER:-}'
      SMTP_PASS: '${SMTP_PASS:-}'
      SMTP_FROM: '${SMTP_FROM:-Sovereign <dev@localhost>}'
    volumes:
      - ./data:/app/data
    depends_on:
      - auth
      - mailpit
    networks:
      - sovereign_net

networks:
  sovereign_net:
    driver: bridge
