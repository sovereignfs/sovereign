packages:
  - 'apps/*'
  - 'packages/*'
  - 'plugins/*'
  - 'runtime'

# Single source of truth for shared dev tooling versions. Packages reference
# these with `"typescript": "catalog:"` etc. so a `pnpm add` can never float one
# package onto a different major. Add a dep here when it is used by more than one
# package (the toolchain), not for package-specific deps (zod, drizzle, …).
catalog:
  typescript: ^5.9.3
  tsup: ^8.5.1
  react: ^19.0.0
  react-dom: ^19.0.0
  '@types/react': ^19.0.0
  '@types/react-dom': ^19.0.0
  next: ^15.0.0
  semver: ^7.7.2
  '@types/semver': ^7.7.0

# Transitive deps allowed to run install scripts (pnpm blocks them by default).
# esbuild (via tsx) needs its postinstall to link the platform binary.
# better-sqlite3 needs its postinstall to fetch/compile the native binding.
# simple-git-hooks: declined — the root `prepare` script installs the git hooks
# explicitly, so the dependency's own postinstall is redundant.
catalogs:
  # Storybook — used exclusively by packages/ui. All addon versions must
  # stay in lock-step with the storybook core version.
  storybook:
    storybook: ^10.4.6
    '@storybook/react-vite': ^10.4.6
    '@storybook/addon-a11y': ^10.4.6
    '@storybook/addon-themes': ^10.4.6
    # @storybook/addon-viewport was absorbed into the storybook core package in v9+.
    # Use parameters.viewport in preview.ts; no separate addon needed.
    # @storybook/test was similarly absorbed; import from 'storybook/test' instead.

allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: false
  simple-git-hooks: false

# VitePress requires vue/server-renderer to be resolvable from its own context
# (used in the SSR bundle). pnpm's strict isolation blocks this by default; the
# extension promotes vue to a real dependency so pnpm links it into VitePress's
# node_modules alongside it.
packageExtensions:
  vitepress@*:
    dependencies:
      vue: '^3.5'
