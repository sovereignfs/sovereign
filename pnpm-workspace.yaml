packages:
  - 'apps/*'
  - 'packages/*'
  - 'plugins/*'
  - 'runtime'

# Keep native dependencies such as better-sqlite3 compiled against the same
# Node ABI used by dev and production. Docker uses node:24-alpine.
engineStrict: true
useNodeVersion: 24.12.0

# Single source of truth for shared dev tooling versions. Packages reference
# these with `"typescript": "catalog:"` etc. so a `pnpm add` can never float one
# package onto a different major. Add a dep here when it is used by more than one
# package (the toolchain), not for package-specific deps (zod, drizzle, …).
catalog:
  typescript: ^5.9.3
  tsup: ^8.5.1
  react: ^19.0.0
  react-dom: ^19.0.0
  '@types/react': ^19.0.0
  '@types/react-dom': ^19.0.0
  next: ^15.0.0
  semver: ^7.7.2
  '@types/semver': ^7.7.0

# Transitive deps allowed to run install scripts (pnpm blocks them by default).
# esbuild (via tsx) needs its postinstall to link the platform binary.
# better-sqlite3 needs its postinstall to fetch/compile the native binding.
# simple-git-hooks: declined — the root `prepare` script installs the git hooks
# explicitly, so the dependency's own postinstall is redundant.
catalogs:
  # Storybook — used exclusively by packages/ui. All addon versions must
  # stay in lock-step with the storybook core version.
  storybook:
    storybook: ^10.4.6
    '@storybook/react-vite': ^10.4.6
    '@storybook/addon-a11y': ^10.4.6
    '@storybook/addon-themes': ^10.4.6
    # @storybook/addon-viewport was absorbed into the storybook core package in v9+.
    # Use parameters.viewport in preview.ts; no separate addon needed.
    # @storybook/test was similarly absorbed; import from 'storybook/test' instead.

allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: false
  simple-git-hooks: false

# VitePress's dev/build root is docs/ (the content srcDir), which sits outside
# apps/docs and has no node_modules of its own. Vite/Rollup resolve packages by
# walking up from docs/ to the repo root, so vitepress itself — and the
# default-theme runtime deps its dev-server config force-resolves via the
# "vitepress > <pkg>" nested-resolution syntax — must be reachable from the
# repo root, not just inside apps/docs's own isolated node_modules.
publicHoistPattern:
  - vitepress
  - vue
  - '@vue/*'
  - '@vueuse/*'
  - mark.js
  - minisearch

# VitePress requires vue/server-renderer to be resolvable from its own context
# (used in the SSR bundle), and its dev-server config forces esbuild to
# pre-resolve @vue/devtools-api, @vueuse/core, @vueuse/integrations, mark.js,
# and minisearch via the "vitepress > <pkg>" nested-resolution syntax (see
# optimizeDeps.include in VitePress's own Vite config). Both cases need the
# package resolvable from *inside* vitepress's own node_modules, not just
# hoisted to the workspace root. pnpm's strict isolation blocks this by
# default; these extensions promote the packages to real dependencies of
# vitepress so pnpm links them into its node_modules alongside it.
packageExtensions:
  vitepress@*:
    dependencies:
      vue: '^3.5'
      '@vue/devtools-api': '^7.7.0'
      '@vueuse/core': '^12.4.0'
      '@vueuse/integrations': '^12.4.0'
      'mark.js': '8.11.1'
      minisearch: '^7.1.1'
